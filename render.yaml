services:
  - type: web
    name: voices
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run db:migrate:deploy && npm run build
    startCommand: npm start
    disk:
      name: voices-uploads
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: voices-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: ADMIN_PASSWORD
        sync: false  # set manually in Render dashboard — keep it secret
      - key: NEXT_PUBLIC_BASE_URL
        sync: false  # set to your Render service URL

databases:
  - name: voices-db
    databaseName: voices
    region: oregon
    plan: starter
