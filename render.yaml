services:
  - type: web
    name: voices
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run db:migrate:deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: voices-db
          property: connectionString
      - key: NEXT_PUBLIC_BASE_URL
        sync: false  # set manually in Render dashboard to your service URL

databases:
  - name: voices-db
    databaseName: voices
    region: oregon
    plan: starter
